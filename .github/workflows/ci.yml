name: guards
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install pytest
        run: pip install pytest
      - name: test the guards (the safety system must be correct)
        run: python -m pytest tests/ -q
      - name: selftest (guards behave on the bundled example)
        run: bash bin/selftest.sh
